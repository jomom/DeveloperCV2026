<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joel Momanyi Nyaosi | Software Engineer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;300;400;500;600;700;800;900&family=Ovo&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              main: 'var(--color-bg)',
              surface: 'var(--color-surface)',
              muted: 'var(--color-muted)',
              high: 'var(--color-high)',
            },
            fontFamily: {
              sans: ['Outfit', 'sans-serif'],
              serif: ['Ovo', 'serif'],
            },
          },
        },
      }
    </script>
    <style>
      @layer base {
        :root {
          /* Light Theme using Palette */
          --color-bg: #DFD0B8;
          --color-surface: #D8C8AF;
          --color-muted: #393E46;
          --color-high: #222831;
          --spotlight-color: rgba(34, 40, 49, 0.05);
        }
        .dark {
          /* Dark Theme using Palette */
          --color-bg: #222831;
          --color-surface: #393E46;
          --color-muted: #948979;
          --color-high: #DFD0B8;
          --spotlight-color: rgba(223, 208, 184, 0.08);
        }
        body {
          font-family: 'Ovo', serif;
          background-color: var(--color-bg);
          color: var(--color-high);
          transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1), color 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        h1, h2, h3, h4, h5, h6, nav, button, .font-heading {
          font-family: 'Outfit', sans-serif;
        }
      }
    </style>
